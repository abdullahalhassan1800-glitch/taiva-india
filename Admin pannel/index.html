<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Taiva Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
  <div class="login-box">
    <h1>Taiva Admin</h1>
    <p>Sign in to your account</p>
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" value="Admin" autocomplete="username">
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
    </div>
    <button class="login-btn" onclick="handleLogin()">Sign in</button>
    <div class="login-error" id="loginError"></div>
  </div>
  <script src="app.js"></script>
  <script>
    async function handleLogin() {
      var username = document.getElementById('username').value;
      var password = document.getElementById('password').value;
      var errorEl = document.getElementById('loginError');
      errorEl.textContent = 'Syncing data...';
      errorEl.style.display = 'block';
      errorEl.style.color = 'var(--accent)';
      await autoRestoreFromMilesweb();
      if (login(username, password)) {
        window.location.href = 'dashboard.html';
      } else {
        errorEl.style.display = 'block';
        errorEl.textContent = 'Invalid username or password.';
      }
    }
    document.getElementById('password').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
